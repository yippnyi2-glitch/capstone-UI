<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 상세 정보 - 예시 사이트</title>
    <link rel="stylesheet" href="style.css?v=1.2">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="header-content">
            <div class="header-title-box">
                <h1 class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">🖼️ 이미지 상세 정보</a></h1>
                <p class="subtitle">선택한 이미지의 세부 정보와 원본 링크를 확인합니다</p>
            </div>
            <div class="header-top">
                <a href="index.html" class="nav-btn">← 갤러리로 돌아가기</a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="detail-container">
            <div class="detail-image-box">
                <img id="detailImage" src="" alt="상세 이미지">
            </div>

            <div class="detail-info-box">
                <div class="url-info">
                    <h3>이미지 주소 (URL)</h3>
                    <p id="imageUrlText" class="url-text"></p>
                </div>

                <div class="action-box">
                    <button id="moveToTakedownBtn" class="delete-btn" style="width: 100%;">📢 이 이미지 신고하기</button>
                    <a href="index.html" class="back-link" style="display: none;">← 갤러리로 돌아가기</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 크롤링 연습 페이지 - Content Report Center</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(window.location.search);
            const displayUrl = params.get('url');

            if (displayUrl) {
                // 표시용 텍스트 설정
                document.getElementById('imageUrlText').innerText = displayUrl;

                // 실제 이미지 소스로 변환 (가상 도메인 -> /uploads/)
                let realSrc = displayUrl;
                if (displayUrl.startsWith('https://practice-crawling.com/gallery/')) {
                    const filename = displayUrl.split('/').pop();
                    realSrc = `/uploads/${filename}`;
                }

                document.getElementById('detailImage').src = realSrc;

                document.getElementById('moveToTakedownBtn').onclick = function () {
                    window.location.href = `takedown.html?v=1.2&target_url=${encodeURIComponent(displayUrl)}`;
                };
            } else {
                alert('잘못된 접근입니다.');
                window.location.href = 'index.html';
            }
        });
    </script>
</body>

</html>
